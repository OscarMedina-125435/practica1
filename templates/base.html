<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestor de Tareas{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        
        body { padding-top: 60px; }
    </style>
</head>
<body class="bg-black text-white">

    <nav class="navbar navbar-expand navbar-dark bg-black border-bottom border-secondary fixed-top">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="/">
            <img src="{{ url_for('static', filename='img/logo.jpg') }}" alt="Logo" width="30" height="30" class="d-inline-block align-text-top me-2 rounded-circle">
            <span class="fw-bold">Rutina Diaria</span>
        </a>

        <div class="navbar-nav me-auto">
            <a class="nav-link" href="/"><i class="bi bi-clipboard-check"></i></a>
            <a class="nav-link" href="/perfil"><i class="bi bi-person-circle"></i></a>
        </div>

        <div class="d-flex gap-2">
          <a href="/login" class="btn btn-sm btn-outline-light border-secondary px-3">Log in</a>
          <a href="/register" class="btn btn-sm btn-light fw-bold px-3">Sign up</a>
        </div>
      </div>
    </nav>

    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
