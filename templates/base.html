<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestor de Tareas{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <style>
        
        body { padding-top: 60px; }
    </style>
</head>
<body class="bg-black text-white">

    <nav class="navbar navbar-expand navbar-dark bg-black border-bottom border-secondary fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="/">
            <img src="{{ url_for('static', filename='img/logo.jpg') }}" alt="Logo" width="30" height="30" class="d-inline-block align-text-top me-2 rounded-circle">
            <span class="fw-bold">Rutina Diaria</span>
        </a>

        <div class="navbar-nav me-auto align-items-center">
            <a class="nav-link" href="/"><i class="bi bi-clipboard-check"></i></a>
            
            {% if session.get('user_id') %}
                <span class="nav-link text-secondary small me-3">
                    <i class="bi bi-person me-1"></i>{{ session.get('nombre') }}
                </span>
                
                <a class="nav-link text-danger" href="{{ url_for('logout') }}" title="Cerrar Sesión">
                    <i class="bi bi-box-arrow-right"></i>
                </a>
            {% endif %}
        </div>

        <div class="d-flex gap-2">
            {% if not session.get('user_id') %}
                <a href="/login" class="btn btn-sm btn-outline-light border-secondary px-3">Log in</a>
                <a href="/register" class="btn btn-sm btn-light fw-bold px-3">Sign up</a>
            {% else %}
                <a href="/perfil" class="btn btn-sm btn-outline-secondary text-white border-secondary px-3">Mi Perfil</a>
            {% endif %}
        </div>
    </div>
</nav>

    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
