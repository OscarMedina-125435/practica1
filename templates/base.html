<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>{% block title %}Agenda{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- BOTÓN PARA ABRIR MENU -->
<button class="btn btn-dark m-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#menu">
    ☰ Menú
</button>

<!-- MENÚ LATERAL -->
<div class="offcanvas offcanvas-start" tabindex="-1" id="menu">
    <div class="offcanvas-header">
    <h5 class="offcanvas-title">Mi Agenda</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="offcanvas-body">

    <!-- BOTÓN A TAREAS (INDEX) -->
    <a href="{{ url_for('index') }}">
        <button class="btn btn-outline-primary w-100 mb-2">
     📒 Tareas
        </button>
    </a>

    <!-- LOGIN -->
    <a href="{{ url_for('login') }}">
        <button class="btn btn-outline-secondary w-100 mb-2">
        🗝️ Login
        </button>
    </a>

    <!-- REGISTRO -->
    <a href="{{ url_for('registro') }}">
        <button class="btn btn-outline-success w-100 mb-2">
        🖋️ Registro
        </button>
    </a>

    </div>
</div>

<!-- CONTENIDO DE CADA PÁGINA -->
<div class="container">
    {% block content %}
    {% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
